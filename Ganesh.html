<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monster Shot 🎮</title>

<style>
body{
margin:0;
overflow:hidden;
font-family:Arial;
background:black;
color:white;
}

/* screens */
.screen{
display:none;
width:100vw;
height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
}
.active{display:flex}

/* game */
#game{
position:relative;
width:100vw;
height:100vh;
background:url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee') center/cover;
}

/* MONSTER */
#monster{
position:absolute;
top:40%;
left:60%;
width:150px;
height:150px;
background:url('https://cdn-icons-png.flaticon.com/512/616/616494.png') center/contain no-repeat;
}

/* scope */
#scope{
position:absolute;
width:80px;
height:80px;
border:2px solid white;
border-radius:50%;
transform:translate(-50%,-50%);
pointer-events:none;
}

/* fire button */
#fireBtn{
position:fixed;
bottom:30px;
right:30px;
width:110px;
height:110px;
border-radius:50%;
background:rgba(255,255,255,0.1);
border:3px solid white;
display:flex;
justify-content:center;
align-items:center;
font-size:30px;
}

/* flash */
#flash{
position:absolute;
width:100%;
height:100%;
background:white;
opacity:0;
transition:0.2s;
}

/* final */
#final{
display:none;
width:100vw;
height:100vh;
background:black;
flex-direction:column;
align-items:center;
justify-content:center;
opacity:0;
transition:1s;
}

/* slider */
#slider{
display:flex;
transition:1s;
}
.slide{
min-width:100%;
text-align:center;
}
.slide img{
width:250px;
height:250px;
border-radius:15px;
}

#caption{margin-top:10px;color:#ccc}
#message{margin-top:20px;text-align:center}
</style>
</head>

<body>

<!-- GAME -->
<div id="game" class="screen active">
<div id="monster"></div>
<div id="scope"></div>
<div id="flash"></div>
</div>

<div id="fireBtn">🔥</div>

<!-- FINAL -->
<div id="final" class="screen">

<h1>💥 Perfect Shot 💥</h1>

<div id="slider">
<div class="slide"><img src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e"></div>
<div class="slide"><img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee"></div>
<div class="slide"><img src="https://images.unsplash.com/photo-1519125323398-675f0ddb6308"></div>
</div>

<div id="caption"></div>
<p id="message"></p>

</div>

<script>

let scope=document.getElementById("scope");
let monster=document.getElementById("monster");
let fireBtn=document.getElementById("fireBtn");
let flash=document.getElementById("flash");

/* AIM */
document.addEventListener("mousemove",e=>{
scope.style.left=e.clientX+"px";
scope.style.top=e.clientY+"px";
});

/* SHOOT */
fireBtn.onclick=()=>{

/* flash */
flash.style.opacity=0.8;
setTimeout(()=>flash.style.opacity=0,100);

/* bounding box hit detection */
let m=monster.getBoundingClientRect();
let s=scope.getBoundingClientRect();

let sx=s.left+s.width/2;
let sy=s.top+s.height/2;

/* check if scope center is inside monster box */
if(
sx >= m.left &&
sx <= m.right &&
sy >= m.top &&
sy <= m.bottom
){
showFinal();
}else{
alert("Miss 😅 Try again");
location.reload();
}

};

/* FINAL */
function showFinal(){
game.style.opacity="0";
fireBtn.style.display="none";

setTimeout(()=>{
game.style.display="none";
final.style.display="flex";

setTimeout(()=>final.style.opacity=1,50);

startSlider();
typeMessage();
},500);
}

/* SLIDER */
let index=0;
let captions=[
"Where it started ❤️",
"Our fun moments 😂",
"Gaming memories 🎮"
];

function startSlider(){
let slider=document.getElementById("slider");
let caption=document.getElementById("caption");

caption.innerText=captions[0];

setInterval(()=>{
index=(index+1)%3;
slider.style.transform=`translateX(-${index*100}%)`;
caption.innerText=captions[index];
},2500);
}

/* TEXT */
function typeMessage(){
let text="You always hit the target… just like you hit my life ❤️";
let i=0;

let msg=document.getElementById("message");
msg.innerHTML="";

let interval=setInterval(()=>{
msg.innerHTML+=text[i];
i++;
if(i>=text.length) clearInterval(interval);
},40);
}

</script>

</body>
</html>
