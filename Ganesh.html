<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mission 🎬</title>

<style>
body{
    margin:0;
    overflow:hidden;
    font-family:Arial;
    background:black;
    color:white;
}

/* Screens */
.screen{
    display:none;
    width:100vw;
    height:100vh;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}
.active{display:flex}

/* SELECT */
#select{background:#111}
.guns{
    display:flex;
    flex-wrap:wrap;
    gap:15px;
}
.gun{
    padding:10px 15px;
    border:1px solid #333;
    border-radius:8px;
    cursor:pointer;
}

/* GAME */
#game{
    position:relative;
    width:100vw;
    height:100vh;
    background:url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee') center/cover;
}

/* Target */
#target{
    position:absolute;
    top:45%;
    left:65%;
    width:110px;
    height:110px;
    border-radius:50%;
    background:radial-gradient(circle,red 20%,white 20%,white 40%,red 40%);
}

/* Scope */
#scope{
    position:absolute;
    width:80px;
    height:80px;
    border:2px solid white;
    border-radius:50%;
    transform:translate(-50%,-50%);
    pointer-events:none;
}

/* FIRE BUTTON */
#fireBtn{
    position:fixed;
    bottom:30px;
    right:30px;
    width:110px;
    height:110px;
    border-radius:50%;
    background:rgba(255,255,255,0.1);
    border:3px solid white;
    display:none;
    justify-content:center;
    align-items:center;
    font-size:30px;
    z-index:999;
}

/* FINAL */
#final{
    display:none;
    width:100vw;
    height:100vh;
    background:black;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    opacity:0;
    transition:1s;
}

/* SLIDER */
#sliderContainer{
    width:90%;
    overflow:hidden;
}

#slider{
    display:flex;
    transition:1s;
}

.slide{
    min-width:100%;
    text-align:center;
}

.slide img{
    width:250px;
    height:250px;
    border-radius:15px;
}

/* Caption */
#caption{
    margin-top:10px;
    color:#ccc;
    font-size:16px;
}

/* Message */
#message{
    margin-top:20px;
    font-size:18px;
    text-align:center;
}
</style>
</head>

<body>

<!-- SELECT -->
<div id="select" class="screen active">
<h2>🔫 Choose Weapon</h2>
<div class="guns">
<div class="gun" onclick="startGame()">MP40</div>
<div class="gun" onclick="startGame()">AK47</div>
<div class="gun" onclick="startGame()">P90</div>
<div class="gun" onclick="startGame()">UMP</div>
<div class="gun" onclick="startGame()">AUG</div>
<div class="gun" onclick="startGame()">THOMPSON</div>
</div>
</div>

<!-- GAME -->
<div id="game" class="screen">
<div id="target"></div>
<div id="scope"></div>
</div>

<!-- FIRE -->
<div id="fireBtn">🔥</div>

<!-- FINAL -->
<div id="final" class="screen">

<h1>💥 Perfect Shot 💥</h1>

<div id="sliderContainer">
<div id="slider">

<div class="slide">
<img src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e">
</div>

<div class="slide">
<img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
</div>

<div class="slide">
<img src="https://images.unsplash.com/photo-1519125323398-675f0ddb6308">
</div>

</div>
</div>

<div id="caption"></div>
<p id="message"></p>

</div>

<script>

/* FIXED VARIABLES */
let select=document.getElementById("select");
let game=document.getElementById("game");
let final=document.getElementById("final");

let scope=document.getElementById("scope");
let target=document.getElementById("target");
let fireBtn=document.getElementById("fireBtn");

/* STATE */
let shot=false;

/* START */
function startGame(){
    select.classList.remove("active");
    game.classList.add("active");
    fireBtn.style.display="flex";
}

/* AIM */
document.addEventListener("mousemove",e=>{
    scope.style.left=e.clientX+"px";
    scope.style.top=e.clientY+"px";
});

/* SHOOT */
fireBtn.onclick=()=>{
if(shot) return;
shot=true;

let t=target.getBoundingClientRect();
let s=scope.getBoundingClientRect();

let sx=s.left+s.width/2;
let sy=s.top+s.height/2;

let tx=t.left+t.width/2;
let ty=t.top+t.height/2;

let dist=Math.sqrt((sx-tx)**2+(sy-ty)**2);

if(dist<60){
    showFinal();
}else{
    alert("Miss 😅");
    location.reload();
}
};

/* FINAL */
function showFinal(){
    game.style.display="none";
    fireBtn.style.display="none";

    final.style.display="flex";

    setTimeout(()=>final.style.opacity=1,50);

    startSlider();
    typeMessage();
}

/* SLIDER */
let index=0;
let captions=[
"Where it started ❤️",
"Our fun moments 😂",
"Gaming memories 🎮"
];

function startSlider(){
let slider=document.getElementById("slider");
let caption=document.getElementById("caption");

caption.innerText=captions[0];

setInterval(()=>{
index=(index+1)%captions.length;
slider.style.transform=`translateX(-${index*100}%)`;
caption.innerText=captions[index];
},2500);
}

/* TYPEWRITER */
function typeMessage(){
let text="You are not just my teammate… you are my best memory ❤️";
let i=0;

let msg=document.getElementById("message"); // ✅ FIX
msg.innerHTML="";

let interval=setInterval(()=>{
msg.innerHTML+=text[i];
i++;
if(i>=text.length) clearInterval(interval);
},40);
}

</script>

</body>
</html>
