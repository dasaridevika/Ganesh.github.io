<!DOCTYPE html>
<html>
<head>
<title>Final Mission ❤️</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial;
    background: black;
    color: white;
}

/* GAME */
#game {
    width: 100vw;
    height: 100vh;
    background: radial-gradient(circle, #111, #000);
    position: relative;
    transition: opacity 0.8s;
}

/* Target */
#target {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 120px;
    height: 120px;
    transform: translate(-50%, -50%) scale(0);
    border-radius: 50%;
    background: radial-gradient(circle, red 20%, white 20%, white 40%, red 40%);
    transition: transform 2s ease;
}

/* Scope */
#scope {
    position: absolute;
    width: 70px;
    height: 70px;
    border: 2px solid white;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
}

/* Shoot Button */
#shootBtn {
    position: absolute;
    bottom: 40px;
    right: 40px;
    width: 80px;
    height: 80px;
    background: red;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 20px;
}

/* FINAL SCREEN */
#final {
    display: none;
    position: absolute;
    width: 100%;
    height: 100%;
    background: black;
    top: 0;
    left: 0;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 1s;
}

/* SLIDESHOW */
#sliderContainer {
    width: 90%;
    overflow: hidden;
    margin-top: 20px;
}

#slider {
    display: flex;
    transition: transform 1s ease;
}

.slide {
    min-width: 100%;
    text-align: center;
}

.slide img {
    width: 250px;
    height: 250px;
    object-fit: cover;
    border-radius: 15px;
}

/* Caption */
#caption {
    margin-top: 10px;
    font-size: 16px;
    color: #ccc;
}

/* Message */
#message {
    margin-top: 20px;
    font-size: 18px;
    text-align: center;
}
</style>
</head>

<body>

<!-- GAME -->
<div id="game">
    <div id="target"></div>
    <div id="scope"></div>
    <div id="shootBtn">🔥</div>
</div>

<!-- FINAL -->
<div id="final">

    <h1>💥 Perfect Moment 💥</h1>

    <div id="sliderContainer">
        <div id="slider">

            <div class="slide">
                <img src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e">
            </div>

            <div class="slide">
                <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
            </div>

            <div class="slide">
                <img src="https://images.unsplash.com/photo-1519125323398-675f0ddb6308">
            </div>

            <div class="slide">
                <img src="https://images.unsplash.com/photo-1492724441997-5dc865305da7">
            </div>

        </div>
    </div>

    <div id="caption"></div>
    <p id="message"></p>

</div>

<script>
let scope = document.getElementById("scope");
let target = document.getElementById("target");
let shotUsed = false;

/* SHOW TARGET */
setTimeout(() => {
    target.style.transform = "translate(-50%, -50%) scale(1)";
}, 1000);

/* AIM */
document.addEventListener("mousemove", e => {
    scope.style.left = e.clientX + "px";
    scope.style.top = e.clientY + "px";
});

document.addEventListener("touchmove", e => {
    let t = e.touches[0];
    scope.style.left = t.clientX + "px";
    scope.style.top = t.clientY + "px";
});

/* SHOOT */
document.getElementById("shootBtn").onclick = () => {

    if (shotUsed) return;
    shotUsed = true;

    let t = target.getBoundingClientRect();
    let s = scope.getBoundingClientRect();

    let sx = s.left + s.width/2;
    let sy = s.top + s.height/2;

    let tx = t.left + t.width/2;
    let ty = t.top + t.height/2;

    let dist = Math.sqrt((sx-tx)**2+(sy-ty)**2);

    if (dist < 40) {
        target.style.background = "lime";
        setTimeout(showFinal, 800);
    } else {
        alert("Missed… try again ❤️");
        location.reload();
    }
};

/* FINAL TRANSITION */
function showFinal() {
    let game = document.getElementById("game");
    let final = document.getElementById("final");

    game.style.opacity = "0";

    setTimeout(() => {
        game.style.display = "none";
        final.style.display = "flex";

        setTimeout(() => {
            final.style.opacity = "1";
        }, 50);

        startSlider();
        typeMessage();

    }, 800);
}

/* SLIDER */
let index = 0;
let captions = [
    "Where it all started ❤️",
    "Our best moments 😂",
    "Gaming memories 🎮",
    "Forever friends 💯"
];

function startSlider() {
    let slider = document.getElementById("slider");
    let caption = document.getElementById("caption");

    caption.innerText = captions[0];

    setInterval(() => {
        index = (index + 1) % 4;
        slider.style.transform = `translateX(-${index * 100}%)`;
        caption.innerText = captions[index];
    }, 2500);
}

/* TYPEWRITER */
function typeMessage() {
    let text = "Every moment with you is special… and this is just a small way to show it ❤️";
    let i = 0;
    let msg = document.getElementById("message");

    let interval = setInterval(() => {
        msg.innerHTML += text[i];
        i++;
        if (i >= text.length) clearInterval(interval);
    }, 40);
}
</script>

</body>
  </html>
