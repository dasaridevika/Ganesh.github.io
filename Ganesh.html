<!DOCTYPE html>
<html>
<head>
<title>Final Mission 🎮</title>

<style>
body{
    margin:0;
    overflow:hidden;
    font-family:Arial;
    background:black;
    color:white;
}

/* SCREENS */
.screen{
    display:none;
    width:100vw;
    height:100vh;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}
.active{display:flex;}

/* SELECT GUN */
#select{
    background:#0d0d0d;
}

.guns{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
}

.gun{
    width:120px;
    text-align:center;
    cursor:pointer;
}

.gun img{
    width:100%;
    border-radius:10px;
}

/* GAME */
#game{
    background:url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee') no-repeat center/cover;
    position:relative;
}

/* Target */
#target{
    position:absolute;
    top:50%;
    left:70%;
    width:100px;
    height:100px;
    border-radius:50%;
    background:radial-gradient(circle,red 20%,white 20%,white 40%,red 40%);
}

/* Scope */
#scope{
    position:absolute;
    width:70px;
    height:70px;
    border:2px solid white;
    border-radius:50%;
    transform:translate(-50%,-50%);
    pointer-events:none;
}

/* Shoot Button */
#shootBtn{
    position:absolute;
    bottom:40px;
    right:40px;
    width:80px;
    height:80px;
    background:red;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:20px;
}

/* FINAL */
#final{
    background:black;
    opacity:0;
    transition:1s;
}

/* SLIDER */
#sliderContainer{
    width:90%;
    overflow:hidden;
}

#slider{
    display:flex;
    transition:1s;
}

.slide{
    min-width:100%;
    text-align:center;
}

.slide img{
    width:250px;
    height:250px;
    object-fit:cover;
    border-radius:15px;
}

#caption{
    margin-top:10px;
    color:#ccc;
}

#message{
    margin-top:20px;
    font-size:18px;
}
</style>
</head>

<body>

<!-- GUN SELECT -->
<div id="select" class="screen active">
<h1>🔫 Choose Your Weapon</h1>

<div class="guns">

<div class="gun" onclick="startGame('MP40')">
<img src="https://i.imgur.com/5b6pG7R.png">
<p>MP40</p>
</div>

<div class="gun" onclick="startGame('AK47')">
<img src="https://i.imgur.com/2z6XG5K.png">
<p>AK47</p>
</div>

<div class="gun" onclick="startGame('P90')">
<img src="https://i.imgur.com/V9w7p6C.png">
<p>P90</p>
</div>

<div class="gun" onclick="startGame('UMP')">
<img src="https://i.imgur.com/VKQx3Xe.png">
<p>UMP</p>
</div>

<div class="gun" onclick="startGame('AUG')">
<img src="https://i.imgur.com/9t6Z3VZ.png">
<p>AUG</p>
</div>

<div class="gun" onclick="startGame('THOMPSON')">
<img src="https://i.imgur.com/jK3X9Qk.png">
<p>Thompson</p>
</div>

</div>
</div>

<!-- GAME -->
<div id="game" class="screen">
<div id="target"></div>
<div id="scope"></div>
<div id="shootBtn">🔥</div>
</div>

<!-- FINAL -->
<div id="final" class="screen">

<h1>💥 Perfect Shot 💥</h1>

<div id="sliderContainer">
<div id="slider">

<div class="slide">
<img src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e">
</div>

<div class="slide">
<img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
</div>

<div class="slide">
<img src="https://images.unsplash.com/photo-1519125323398-675f0ddb6308">
</div>

<div class="slide">
<img src="https://images.unsplash.com/photo-1492724441997-5dc865305da7">
</div>

</div>
</div>

<div id="caption"></div>
<p id="message"></p>

</div>

<script>
let shot=false;
let scope=document.getElementById("scope");

/* START GAME */
function startGame(gun){
    document.getElementById("select").classList.remove("active");
    document.getElementById("game").classList.add("active");
}

/* AIM */
document.addEventListener("mousemove",e=>{
    scope.style.left=e.clientX+"px";
    scope.style.top=e.clientY+"px";
});

/* SHOOT */
document.getElementById("shootBtn").onclick=()=>{

if(shot) return;
shot=true;

let t=target.getBoundingClientRect();
let s=scope.getBoundingClientRect();

let sx=s.left+s.width/2;
let sy=s.top+s.height/2;

let tx=t.left+t.width/2;
let ty=t.top+t.height/2;

let dist=Math.sqrt((sx-tx)**2+(sy-ty)**2);

if(dist<50){
    setTimeout(showFinal,700);
}else{
    alert("Miss 😅");
    location.reload();
}
};

/* FINAL */
function showFinal(){
game.style.display="none";
final.style.display="flex";

setTimeout(()=>final.style.opacity=1,50);

startSlider();
typeMessage();
}

/* SLIDER */
let index=0;
let captions=[
"Where it all started ❤️",
"Our crazy moments 😂",
"Gaming together 🎮",
"Forever ❤️"
];

function startSlider(){
let slider=document.getElementById("slider");
let caption=document.getElementById("caption");

caption.innerText=captions[0];

setInterval(()=>{
index=(index+1)%4;
slider.style.transform=`translateX(-${index*100}%)`;
caption.innerText=captions[index];
},2500);
}

/* TYPEWRITER */
function typeMessage(){
let text="You are not just my teammate… you are my best memory ❤️";
let i=0;

let interval=setInterval(()=>{
message.innerHTML+=text[i];
i++;
if(i>=text.length) clearInterval(interval);
},40);
}
</script>

</body>
</html>
