<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monster Shot 🎮</title>

<style>
body{
margin:0;
font-family:Arial;
background:black;
color:white;
overflow-y:hidden;   /* allow full page scroll */
}

/* GAME */
#game{
position:relative;
width:100vw;
height:100vh;
background:url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee') center/cover;
}

/* MONSTER */
#monster{
position:absolute;
top:40%;
left:60%;
width:180px;
height:180px;
background:url('https://cdn-icons-png.flaticon.com/512/616/616494.png') center/contain no-repeat;
}

/* SCOPE */
#scope{
position:absolute;
width:140px;
height:140px;
border:3px solid white;
border-radius:50%;
pointer-events:none;
z-index:10;
transition:0.05s linear;
}

/* FIRE BUTTON */
#fireBtn{
position:fixed;
bottom:30px;
right:30px;
width:120px;
height:120px;
border-radius:50%;
background:rgba(255,255,255,0.1);
border:3px solid white;
display:flex;
justify-content:center;
align-items:center;
font-size:35px;
z-index:999;
}

/* FLASH */
#flash{
position:absolute;
width:100%;
height:100%;
background:white;
opacity:0;
transition:0.2s;
}

/* FINAL PAGE */
#final{
display:none;
flex-direction:column;
width:100%;
}

/* TOP SLIDESHOW SECTION */
#slideSection{
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

/* SLIDER */
#slider{
display:flex;
width:100%;
transition:1s;
}

.slide{
min-width:100%;
text-align:center;
}

.slide img{
max-width:90%;
max-height:60vh;
object-fit:contain;  /* show full image without cropping */
border-radius:15px;
}

/* MESSAGE SECTION */
#messageSection{
padding:40px 20px;
background:#111;
min-height:100vh;
display:flex;
justify-content:center;
}

/* MESSAGE TEXT */
#message{
margin-top:20px;
text-align:center;
padding:20px;
max-width:800px;
line-height:1.6;

/* IMPORTANT: full page scroll */
max-height:none;
overflow:visible;
}

/* SMOOTH SCROLL */
html{
scroll-behavior:smooth;
}
</style>
</head>

<body>

<div id="game">
  <div id="monster"></div>
  <div id="scope"></div>
  <div id="flash"></div>
</div>

<div id="fireBtn">🔥</div>

<div id="final">

  <!-- 🖼 SLIDESHOW SECTION -->
  <div id="slideSection">
    <h1>💥 Perfect Shot 💥</h1>

    <div id="slider">
      <div class="slide"><img src="1000174147.jpg"></div>
      <div class="slide"><img src="1000174170.jpg"></div>
      <div class="slide"><img src="IMG-20260429-WA0034.jpg"></div>
      <div class="slide"><img src="IMG_20260325_231408.jpg"></div>
      <div class="slide"><img src="IMG_20260427_205008.jpg"></div>
      <div class="slide"><img src="IMG_20260427_205222.jpg"></div>
      <div class="slide"><img src="1000174147.jpg"></div>
    </div>

    <div id="caption"></div>
  </div>
  <div style="text-align:center;margin-top:10px;opacity:0.7;">
⬇ Scroll to read message
  </div>
<div style="margin-top:20px;font-size:14px;opacity:0.7;">
⬇ Scroll to read message
</div>
  <!-- 📜 MESSAGE SECTION -->
  <div id="messageSection">
    <p id="message"></p>
  </div>

</div>

<script>

let scope = document.getElementById("scope");
let monster = document.getElementById("monster");
let fireBtn = document.getElementById("fireBtn");
let flash = document.getElementById("flash");
let game = document.getElementById("game");
let final = document.getElementById("final");

/* 🎯 MOUSE AIM */
document.addEventListener("mousemove", e => {
scope.style.left = (e.clientX - 70) + "px";
scope.style.top = (e.clientY - 70) + "px";
});

/* 📱 TOUCH AIM (FIXED) */
game.addEventListener("touchmove", e => {
  e.preventDefault();

  let t = e.touches[0];
  scope.style.left = (t.clientX - 70) + "px";
  scope.style.top = (t.clientY - 70) + "px";
});

game.addEventListener("touchstart", e => {
  let t = e.touches[0];
  scope.style.left = (t.clientX - 70) + "px";
  scope.style.top = (t.clientY - 70) + "px";
});
/* 🔫 SHOOT */
function shoot(){

flash.style.opacity = 0.8;
setTimeout(()=>flash.style.opacity=0,100);

let m = monster.getBoundingClientRect();
let s = scope.getBoundingClientRect();

/* COLLISION */
let hit = !(
s.right < m.left ||
s.left > m.right ||
s.bottom < m.top ||
s.top > m.bottom
);

if(hit){
showFinal();
}else{
alert("Miss 😅 Try again");
}
}

/* FIRE */
fireBtn.addEventListener("click", shoot);

/* FINAL */
function showFinal(){
game.style.display="none";
fireBtn.style.display="none";

final.style.display="flex";

/* ⭐ ENABLE SCROLL AFTER GAME */
document.body.style.overflow = "auto";

setTimeout(()=>final.style.opacity=1,50);

startSlider();
typeMessage();
}
/* SLIDER */
let index=0;
let captions=[
"Where it started as 2-1 CRs❤️",
"Our fun moments 😂",
"Gaming memories 🎮",
"College ends..Friendship doesn't",
"Shades on,memories loaded",
"Suited up,showed up,Graduated",
"From unknown to known"

];

function startSlider(){
let slider=document.getElementById("slider");
let caption=document.getElementById("caption");

caption.innerText=captions[0];

setInterval(()=>{
let totalSlides = document.querySelectorAll(".slide").length;
index = (index + 1) % totalSlides;
slider.style.transform=`translateX(-${index*100}%)`;
caption.innerText=captions[index];
},2500);
}

/* TYPEWRITER */
function typeMessage(){
let text = `Hello Pentayya...

You became one of the best friends I got ❤️.
  
You know what at the beginning i thought abt u was a proud person.
Mana friendship start aindi ante CRs ainappude.
Appud kopamochchedi m pattinchukokpothunde nake work ala ani.
But tharvatha matladekoddi oka manchi opinion form aindi.
Mirante topper ankondi...Manchiga chadutharu but chill kuda bane kodtharu.
My freefire tutor.Btech ainaka marchipotharemo ikkada inko player undi ani marchipokandi.
Chadvalsina days kuda aipoyay..ee timeki ee chapter start cheddam ane days aipoyay..Chatgpt links,notes send cheyalsina days aipoyay.

Mitho chadvinappud ela untunde ante i had to finish before u ala inka chadvalanna zeal untunde.Competition kakpoina a desire to finish soon.
I like the way u talk like u talk respectfully.

Asal miru normal ga matladutharo ledo ankunna starting lo but ippud nanne tease chesthunnaru.

Aina mi fav Dk sir mimmalni miss avtharemo😂.And munde Vp sir fav student.

In future if u need any help ask me ante mik help chesentha peddollam kakpoina ma chethlo unte chestham.

So finally Mr.Pentayya #topper #Freefire Partner #Captain

From unknown to Unforgettable.Thankyou for being my friend.U will remain as my real friend forever.Ippatki inthe inkemaina anipisthe malli sathiyistha..hehe..
Wish u good luck for your future.Stay healthy.Take care...`;

let i = 0;
let msg = document.getElementById("message");
msg.innerHTML = "";  // reset

let interval = setInterval(()=>{
msg.innerHTML += text[i];

i++;
if(i >= text.length) clearInterval(interval);

}, 40);

/* ⭐ THIS IS THE CORRECT PLACE */
}

/* MONSTER MOVEMENT */
setInterval(()=>{
monster.style.top = Math.random()*70 + "%";
monster.style.left = Math.random()*70 + "%";
},2000);

</script>

</body>
</html>
